name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Run tests
        run: pnpm test
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas
          JWT_SECRET: test-secret-for-ci

      - name: Build
        run: pnpm run build
        working-directory: apps/backend

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install backend deps (shared Prisma client)
        run: pnpm install --frozen-lockfile && npx prisma generate
        working-directory: apps/backend

      - name: Install worker dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/worker

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/worker

      - name: Run tests
        run: pnpm test
        working-directory: apps/worker

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/frontend

      - name: Lint
        run: npx eslint . --max-warnings 0
        working-directory: apps/frontend
        continue-on-error: true # non-blocking for now; tighten later once lint rules are fully dialed in

      - name: Build
        run: pnpm run build
        working-directory: apps/frontend